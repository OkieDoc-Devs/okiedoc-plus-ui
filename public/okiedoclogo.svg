<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FA3D1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5BB4E5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rectangle with rounded corners -->
  <rect width="64" height="64" rx="8" fill="url(#gradient)" />

  <!-- Heart with pulse line integrated -->
  <g transform="translate(6, 8)">
    <!-- Heart shape -->
    <path d="M 11 8 Q 11 5 8.5 5 Q 6.5 5 5.5 7 Q 4.5 5 2.5 5 Q 0 5 0 8 Q 0 11 5.5 15 Q 11 11 11 8 Z"
          fill="white" opacity="0.9" />

    <!-- EKG/Pulse line -->
    <path d="M 0 20 L 3 20 L 4 18 L 5 22 L 6 20 L 11 20"
          fill="none" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.9" />
  </g>

  <!-- OkieDoc+ text -->
  <text x="32" y="38" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="white" text-anchor="middle" letter-spacing="-0.5">OkieDoc+</text>
</svg>
